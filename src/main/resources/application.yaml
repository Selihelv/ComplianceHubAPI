spring:
  application:
    name: ComplianceHubAPI

  datasource:
    url: jdbc:mysql://localhost:3306/compliance_management_hub
    username: root
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect


  web:
    error:
      include-stacktrace: never

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: gpt-5.4-mini